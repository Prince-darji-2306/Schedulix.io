<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task | Schedulix.io</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-logo">Schedulix.io</div>
        <div class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/tasks">Tasks</a>
            <a href="/routine">Daily Routine</a>
            <a href="/notifications">Notifications</a>
            <a href="/login">Logout</a>
        </div>
    </nav>

    <div id="spinner">
        <div class="loader"></div>
        <p>Generating AI Plan...</p>
    </div>

    <div class="glass-card" style="margin-top: 5rem;">
        <h1>Add New Task</h1>

        <form id="taskForm">
            <div class="form-group">
                <label for="title">Task Title</label>
                <input type="text" id="title" name="title" placeholder="e.g. Route Optimization" required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <input type="text" id="description" name="description" placeholder="Short detail about the task">
            </div>
            <div class="form-group">
                <label for="deadline">Deadline</label>
                <input type="datetime-local" id="deadline" name="deadline" required>
            </div>
            <div class="form-group">
                <label for="status">Initial Status</label>
                <select id="status" name="status">
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Completed">Completed</option>
                </select>
            </div>
            <button type="submit">Create Task</button>
        </form>
    </div>

    <script src="/static/js/tasks.js"></script>
</body>

</html>
