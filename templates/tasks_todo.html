<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks | Schedulix.io</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .task-table-container {
            background: #fff;
            padding: 5px 20px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            margin-top: 2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1.2rem 1rem;
            border-bottom: 2px solid var(--bg-light);
            color: var(--primary);
            font-weight: 700;
        }

        td {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid var(--bg-light);
        }
    </style>
</head>

<body style="display: block;">
    <nav class="navbar">
        <div class="nav-logo">Schedulix.io</div>
        <div class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/tasks">Tasks</a>
            <a href="/routine">Daily Routine</a>
            <a href="/notifications">Notifications</a>
            <a href="/login">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container" style="margin: 0 auto;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Active Tasks</h1>
            <a href="/add-task" class="status-badge status-todo"
                style="text-decoration: none; padding: 0.8rem 1.5rem;">+ Add New Task</a>
        </div>

        <div class="task-table-container">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Task Description</th>
                        <th>Deadline</th>
                        <th>Plan</th>
                    </tr>
                </thead>
                <tbody id="tasksTableBody">
                    <tr>
                        <td colspan="4" style="text-align: center;">Loading tasks...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Plan Modal -->
    <div id="planModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="window.closeModal()">&times;</span>
            <h2 id="modalTitle" style="margin-bottom: 1.5rem; text-align: left;">Task Plan</h2>
            <div id="planBody" class="plan-body">
                <!-- AI Plan will be injected here -->
            </div>
            <div class="plan-footer">
                <button id="approveBtn" class="approve-btn" onclick="window.approveCurrentPlan()">Approve Plan</button>
            </div>
        </div>
    </div>

    <script src="/static/js/tasks.js"></script>
</body>

</html>
