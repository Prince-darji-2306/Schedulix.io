<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Routine | Schedulix.io</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        .routine-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
        }

        .routine-item {
            background: #fff;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: flex-start;
            gap: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            animation: slideUp 0.5s ease-out;
        }

        .routine-item:hover {
            transform: translateX(5px);
            border-color: var(--primary);
        }

        .check-container {
            padding-top: 0.2rem;
        }

        .custom-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .routine-content {
            flex: 1;
        }

        .time-badge {
            display: inline-block;
            background: var(--bg-light);
            color: var(--primary);
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        .routine-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .routine-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Checked state styling */
        .routine-item.completed {
            opacity: 0.6;
            background: #f8f8f8;
        }

        .routine-item.completed .routine-title {
            text-decoration: line-through;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #empty-msg {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-weight: 600;
        }
    </style>
</head>

<body style="display: block;">
    <nav class="navbar">
        <div class="nav-logo">Schedulix.io</div>
        <div class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/tasks">Tasks</a>
            <a href="/routine">Daily Routine</a>
            <a href="/notifications">Notifications</a>
            <a href="/login">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container" style="margin: 0 auto; padding-top: 7rem;">
        <div style="text-align: center; margin-bottom: 3rem;">
            <h1>Today's Routine</h1>
            <p class="subtitle">AI-generated schedule based on your deadlines.</p>
        </div>

        <div id="routine-list" class="routine-container">
            <div id="loading" style="text-align: center; padding: 2rem;">
                <div class="loader" style="margin: 0 auto;"></div>
                <p style="margin-top: 1rem; font-weight: 600;">Generating your routine...</p>
            </div>
        </div>
    </div>

    <script src="/static/js/routine.js"></script>
</body>

</html>
