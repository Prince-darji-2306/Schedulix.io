<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task | Schedulix.io</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
</head>

<body style="display: block;">
    <nav class="navbar">
        <div class="nav-logo">Schedulix.io</div>
        <div class="nav-links">
            <a href="/dashboard.html">Dashboard</a>
            <a href="/tasks_todo.html">Tasks</a>
            <a href="/routine.html">Daily Routine</a>
            <a href="/notifications.html">Notifications</a>
            <a href="/index.html">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container" style="max-width: 600px;">
        <div class="glass-card" style="margin: 2rem 0; width: 100%; box-sizing: border-box;">
            <h1>Create New Task</h1>

            <form id="taskForm">
                <div class="form-group">
                    <label for="title">Task Title</label>
                    <input type="text" id="title" name="title" placeholder="e.g., Q1 Project Planning" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" placeholder="Briefly describe the task..."></textarea>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="deadline_date">Deadline Date</label>
                        <input type="date" id="deadline_date" name="deadline_date" required>
                    </div>
                    <div class="form-group">
                        <label for="time">Deadline Time (HH:00)</label>
                        <input type="time" id="time" name="time" step="3600" onchange="roundHour(this)" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="status">Initial Status</label>
                    <select id="status" name="status">
                        <option value="pending">Pending</option>
                        <option value="in_progress">In Progress</option>
                    </select>
                </div>

                <div id="spinner" class="spinner"
                    style="display: none; margin-bottom: 1rem; align-items: center; gap: 0.5rem; color: var(--accent-light);">
                    <div class="loading-dots"><span></span><span></span><span></span></div>
                    <span style="font-size: 0.9rem;">AI is crafting your plan...</span>
                </div>

                <button type="submit">Create Task & Generate Plan</button>
            </form>
        </div>
    </div>

    <script src="/static/js/config.js"></script>
    <script src="/static/js/tasks.js"></script>
</body>

</html>
