<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks | Schedulix.io</title>
    <link rel="icon" href="/static/img/icon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body style="display: block;">
    <nav class="navbar">
        <div class="nav-logo">Schedulix.io</div>
        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="nav-links" id="navLinks">
            <a href="/dashboard">Dashboard</a>
            <a href="/tasks">Tasks</a>
            <a href="/routine">Daily Routine</a>
            <a href="/notifications">Notifications</a>
            <a href="/login">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="overview">
            <div>
                <h1>Active Tasks</h1>
            </div>
            <a href="/add-task" class="status-badge status-todo" id='addTask'>+ Add New Task</a>
        </div>

        <div class="task-table-container">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Task Description</th>
                        <th>Deadline</th>
                        <th>Status</th>
                        <th>Plan</th>
                    </tr>
                </thead>
                <tbody id="tasksTableBody">
                    <tr>
                        <td colspan="4" class="tempbody">Loading tasks...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Plan Modal -->
    <div id="planModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="window.closeModal()">&times;</span>
            <h2 id="modalTitle">Task Plan</h2>
            <div id="planBody" class="plan-body">
                <!-- AI Plan will be injected here -->
            </div>
            <div class="plan-footer">
                <button id="approveBtn" class="approve-btn" onclick="window.approveCurrentPlan()">Approve Plan</button>
            </div>
        </div>
    </div>

    <script src="/static/js/nav.js"></script>
    <script src="/static/js/tasks.js"></script>
</body>

</html>
