<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks | Schedulix.io</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body style="display: block;">
    <nav class="navbar">
        <div class="nav-logo">Schedulix.io</div>
        <div class="nav-links">
            <a href="/dashboard.html">Dashboard</a>
            <a href="/tasks_todo.html">Tasks</a>
            <a href="/routine.html">Daily Routine</a>
            <a href="/notifications.html">Notifications</a>
            <a href="/index.html">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="overview">
            <div>
                <h1>Your Tasks</h1>
                <p class="subtitle">Manage your work and generate AI-powered plans.</p>
            </div>
            <a href="/add_task.html" class="status-badge status-todo"
                style="text-decoration: none; padding: 0.8rem 1.5rem;">Add New Task</a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Task Title</th>
                        <th>Description</th>
                        <th>Deadline</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tasksTableBody">
                    <!-- Tasks will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Plan Modal -->
    <div id="planModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Project Plan</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div id="planBody" class="modal-body">
                <!-- AI Plan will be loaded here -->
            </div>
            <div class="modal-footer">
                <button type="button" id="approveBtn" onclick="approveCurrentPlan()" class="status-badge status-todo"
                    style="border:none; cursor:pointer;">Approve Plan</button>
                <button type="button" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="/static/js/config.js"></script>
    <script src="/static/js/tasks.js"></script>
</body>

</html>
